spec_version: 1
name: supply-chain-auditor-env
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: >
  Supply chain attacks now dominate enterprise security breaches — XZ Utils (2024),
  Log4Shell, and SolarWinds proved that one compromised dependency can cascade into
  millions of victims. This environment trains agents to do what human defenders do
  daily: hunt CVEs in transitive dependency trees, detect typosquatted packages,
  and generate minimal-upgrade remediation plans under deterministic grading.
tags:
  - openenv
  - security
  - software-supply-chain
  - real-world
author: G. Karthik Koundinya
action_space:
  type: object
  properties:
    action_type:
      type: string
      enum:
        - inspect_package
        - check_cve
        - trace_deps
        - flag_package
        - unflag_package
        - generate_sbom
        - remediate
        - submit_report
    package_name:
      type: string
    version:
      type: string
    depth:
      type: integer
      minimum: 1
      maximum: 5
    reason:
      type: string
    target_version:
      type: string
    report:
      type: object
observation_space:
  type: object
  properties:
    task_id:
      type: string
    step:
      type: integer
    max_steps:
      type: integer
    requirements:
      type: array
      items:
        type: string
    objective:
      type: string
    last_action_result:
      type: object
    flags:
      type: array
    remediations:
      type: array
    sbom:
      type: array
    message:
      type: string
    done:
      type: boolean
    reward:
      type: number
    score:
      type: number
reward_range:
  - -1.0
  - 1.0
tasks:
  - id: flat_audit
    name: Flat Dependency Audit
    difficulty: easy
    max_steps: 30
  - id: typosquat_transitive
    name: Typosquatting + Transitive CVE Detection
    difficulty: medium
    max_steps: 50
  - id: full_sbom_remediation
    name: Full SBOM + Remediation Plan
    difficulty: hard
    max_steps: 100
